<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Nuvio TV</title>
  <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <style>
    #nuvio-tizen-boot-status {
      position: fixed;
      left: 24px;
      bottom: 24px;
      z-index: 999999;
      max-width: calc(100vw - 48px);
      padding: 14px 18px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      font: 600 20px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    #nuvio-tizen-boot-status[data-state="error"] {
      background: rgba(120, 0, 0, 0.9);
    }
    #nuvio-tizen-build-label {
      position: fixed;
      left: 50%;
      top: 26px;
      transform: translateX(-50%);
      z-index: 999998;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      color: rgba(255, 255, 255, 0.78);
      font: 600 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #nuvio-tizen-debug-detail {
      position: fixed;
      left: 24px;
      top: 24px;
      z-index: 999997;
      max-width: calc(100vw - 48px);
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.72);
      color: rgba(245, 249, 255, 0.98);
      font: 600 14px/1.35 Menlo, Monaco, "Courier New", monospace;
      white-space: normal;
      word-break: break-word;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
    }
  </style>
</head>
<body>
  <div id="nuvio-tizen-debug-detail"></div>
  <div id="nuvio-tizen-build-label">2026-04-01T22:35:53.190Z</div>
  <div id="nuvio-tizen-boot-status">Booting Nuvio TV...</div>
  <script defer src="main.js"></script>
</body>
</html>
