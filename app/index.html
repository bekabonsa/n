<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Nuvio TV</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font: 600 24px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .launcher-status {
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
      padding: 24px;
    }
    .launcher-build {
      opacity: 0.72;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="launcher-status">
    <div>Opening Nuvio TV...</div>
    <div id="launcher-build" class="launcher-build"></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
