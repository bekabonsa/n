<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Nuvio TV</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body>
  <script>
    (function initPlatformOverrideFromQuery() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      try {
        var params = new URLSearchParams(window.location.search);
        var explicitPlatform = String(params.get("platform") || params.get("wrapper") || "").trim().toLowerCase();
        if (explicitPlatform === "tizen" || explicitPlatform === "webos" || explicitPlatform === "browser") {
          root.__NUVIO_PLATFORM__ = explicitPlatform;
        }
      } catch (_) {}
    }());
  </script>
  <script>
    (function initBootDebug() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      var enabled = false;

      try {
        var params = new URLSearchParams(window.location.search);
        enabled = params.get("bootDebug") === "1";
      } catch (_) {}

      if (!enabled) {
        root.__NUVIO_BOOT_DEBUG__ = {
          enabled: false,
          setStatus: function noop() {},
          fail: function noop() {},
          done: function noop() {}
        };
        return;
      }

      var hideTimer = 0;
      var node = document.createElement("div");
      var bootNode = document.createElement("div");
      var detailNode = document.createElement("div");
      node.id = "nuvio-boot-debug";
      node.style.position = "fixed";
      node.style.left = "24px";
      node.style.top = "24px";
      node.style.zIndex = "999999";
      node.style.maxWidth = "min(1100px, calc(100vw - 48px))";
      node.style.padding = "14px 18px";
      node.style.borderRadius = "14px";
      node.style.background = "rgba(0, 0, 0, 0.82)";
      node.style.color = "#fff";
      node.style.font = "600 20px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      node.style.letterSpacing = "0.02em";
      node.style.boxShadow = "0 10px 30px rgba(0, 0, 0, 0.35)";
      node.style.whiteSpace = "normal";
      node.style.wordBreak = "break-word";
      bootNode.textContent = "Boot debug active.";
      detailNode.style.marginTop = "8px";
      detailNode.style.paddingTop = "8px";
      detailNode.style.borderTop = "1px solid rgba(255,255,255,0.15)";
      detailNode.style.font = "600 16px/1.35 Menlo, Monaco, 'Courier New', monospace";
      detailNode.style.display = "none";
      node.appendChild(bootNode);
      node.appendChild(detailNode);
      document.addEventListener("DOMContentLoaded", function onReady() {
        document.body.appendChild(node);
      }, { once: true });

      function syncVisibility() {
        var hasBootText = Boolean(String(bootNode.textContent || "").trim());
        var hasDetailText = Boolean(String(detailNode.textContent || "").trim());
        node.style.display = hasBootText || hasDetailText ? "block" : "none";
      }

      function setStatus(message, isError) {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = 0;
        }
        bootNode.textContent = String(message || "");
        node.style.background = isError ? "rgba(120, 0, 0, 0.92)" : "rgba(0, 0, 0, 0.82)";
        syncVisibility();
      }

      function setDetail(message, isError) {
        var text = String(message || "").trim();
        detailNode.textContent = text;
        detailNode.style.display = text ? "block" : "none";
        detailNode.style.color = isError ? "rgba(255, 220, 220, 0.98)" : "rgba(235, 243, 252, 0.98)";
        syncVisibility();
      }

      root.__NUVIO_BOOT_DEBUG__ = {
        enabled: true,
        setStatus: function setBootStatus(message) {
          setStatus(message, false);
        },
        fail: function failBootStatus(message) {
          setStatus(message, true);
        },
        done: function finishBootStatus(message) {
          setStatus(message || "App shell ready.", false);
          hideTimer = window.setTimeout(function hideBootText() {
            bootNode.textContent = "";
            syncVisibility();
          }, 3500);
        },
        setDetail: function setDetailStatus(message) {
          setDetail(message, false);
        },
        failDetail: function failDetailStatus(message) {
          setDetail(message, true);
        },
        clearDetail: function clearDetailStatus() {
          setDetail("", false);
        }
      };

      root.__NUVIO_BOOT_DEBUG__.setStatus("Loading runtime config...");
    }());
  </script>
  <script src="nuvio.env.js" onload="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.setStatus('Loaded runtime config. Loading polyfills...')" onerror="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.fail('Failed to load runtime config.')"></script>
  <script src="js/runtime/polyfills.js" onload="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.setStatus('Loaded polyfills. Loading runtime env...')" onerror="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.fail('Failed to load polyfills.')"></script>
  <script src="js/runtime/env.js" onload="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.setStatus('Loaded runtime env. Loading QR library...')" onerror="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.fail('Failed to load runtime env.')"></script>
  <script src="assets/libs/qrcode-generator.js" onload="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.setStatus('Loaded QR library. Loading app bundle...')" onerror="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.fail('Failed to load QR library.')"></script>
  <script defer src="app.bundle.js" onload="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.setStatus('App bundle loaded. Waiting for bootstrap...')" onerror="window.__NUVIO_BOOT_DEBUG__ && window.__NUVIO_BOOT_DEBUG__.fail('Failed to load app bundle.')"></script>
</body>
</html>
